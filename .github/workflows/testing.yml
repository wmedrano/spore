name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub
# Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and latest queued.  However, do NOT cancel
# in-progress runs as we want to allow these production deployments to
# complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Cargo Nextest
        uses: taiki-e/install-action@nextest
      - name: Install Cargo LLVM Cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install LLVM Tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Lint
        run: cargo clippy
      - name: Build
        run: cargo build --verbose --all-targets
      - name: Test
        run: |
          cargo llvm-cov nextest --no-fail-fast
          cargo llvm-cov report --html
      - name: Doc Tests
        run: cargo doc && cargo test --doc
      - name: Run Examples
        run: cargo run --example fib
      - name: Package Artifacts
        run: |
          mkdir artifacts
          mv target/doc/spore_editor artifacts
          mv artifacts/spore_editor artifacts/doc
          mv target/llvm-cov/html artifacts
          mv artifacts/html artifacts/llvm-cov
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: artifacts/
  deploy-site:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
